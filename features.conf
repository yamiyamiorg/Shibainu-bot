# features.conf
# 機能の有効/無効を制御します
# true = 有効
# false = 無効
# true:prod = 本番のみ有効
# true:test = テストのみ有効

yami=false
choco=true
health=true
omikuji=true
boost=false
serverstats=false
diaryreaction=true

# やみさばファンタジー（Player xp / Room Owner xp / ライブボード）
# true:test  → テストサーバーのみ（開発中）
# true:prod  → 本番 + テスト（本番チャンネルID設定後に切り替え）
wiki=true

# ── 故郷のおやじBot ───────────────────────────────────────────────
# true:test  = BOT試験場のみで動作確認
# true:prod  = 全サーバーで有効化
oyaji=false
